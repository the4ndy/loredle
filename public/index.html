<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loredle - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="menu-container">
        <h1>Loredle</h1>

        <div class="rules-card">
            <h2>How to Play</h2>
            <p>🔮 Guess a Disney Lorcana card in as few tries as possible[cite: 1, 2].</p>
            <p>🟩 Correct | 🟨 Close | 🟥 Wrong[cite: 1]</p>
            <p>🔽 Go Lower | 🔼 Go Higher (For stats like Cost/Number)[cite: 1]</p>
        </div>

        <div class="auth-status" id="auth-status-text">
            <!-- Dynamically populated via JS: "Playing as Guest" or "Logged in as [User]" -->
        </div>

        <div class="button-group">
            <button onclick="location.href='/game.html'" class="btn primary-btn">Play Today's Loredle</button>
            <button onclick="location.href='/leaderboard.html'" class="btn secondary-btn">View Leaderboard</button>
            <button id="auth-btn" class="btn minimal-btn">Create Account / Login</button>
        </div>
    </div>

    <script>
        const username = localStorage.getItem('loredle_username');
        const authStatus = document.getElementById('auth-status-text');
        const authBtn = document.getElementById('auth-btn');

        if (username) {
            authStatus.textContent = `Logged in as: ${username}`;
            authBtn.textContent = "Log Out";
            authBtn.onclick = () => {
                localStorage.clear();
                window.location.reload();
            };
        } else {
            authStatus.textContent = "Playing anonymously (Scores won't save to Leaderboard)";
            authBtn.onclick = () => location.href = '/auth.html';
        }
    </script>
</body>

</html>
