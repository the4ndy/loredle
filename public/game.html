<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8C76E2T1CC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-8C76E2T1CC');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loredle - Play</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Top Nav / Back Button -->
    <div
        style="width: 100%; max-width: 700px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button onclick="location.href='/index.html'" class="btn minimal-btn" style="padding: 5px 10px;">&larr; Back to
            Hub</button>
        <div id="auth-status-game" style="font-size: 0.85rem; color: var(--secondary-color);"></div>
    </div>

    <!-- Text Title replacing the image -->
    <h1
        style="color: var(--primary-color); font-size: 3.5rem; margin-top: 0; margin-bottom: 5px; text-align: center; letter-spacing: 3px;">
        Loredle</h1>

    <!-- <div id="win-message"></div> -->
    <!-- <div id="winner-container">You Win!!!</div> -->

    <!-- Cleaned up Input Area -->
    <div id="input-container"
        style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; width: 100%;">
        <div id="image-container" style="width: 300px; height: 419px; position: relative;">
            <img id="hovered-image" src="" alt="Card Image"
                style="display: none; width: 100%; height: 100%; border-radius: 10px; border: 2px solid var(--primary-color);">
            <!-- <img id="loading-image" src="https://lorcanahq.com/wp-content/uploads/2022/09/Official-Lorcana-Logo.png"
                class="loading-spinner" alt="Loading..." role="status"> -->
        </div>
        <div style="width: 100%; max-width: 350px;">
            <input type="text" id="card-input" class="input-field" placeholder="Start typing a card name..."
                style="margin: 0; text-align: center; width: 100%;">
            <ul id="suggestions"
                style="width: 100%; max-height: 200px; overflow-y: auto; background-color: var(--bg-surface); border: 1px solid #444; border-radius: 8px; margin: 0; padding: 0;">
            </ul>
        </div>
    </div>

    <!-- Game Board -->
    <div id="game-board" style="width: 100%; max-width: 750px;">
        <div class="header row">
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Name</div>
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Number</div>
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Set</div>
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Cost</div>
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Inkable</div>
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Color</div>
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Type</div>
            <div class="cell" style="font-weight: bold; background-color: var(--bg-surface);">Rarity</div>
        </div>
        <div id="feedback" style="display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 6px;"></div>
    </div>

    <!-- Results Sharing -->
    <div id="emoji-feedback"
        style="display: none; margin-top: 30px; background-color: var(--bg-surface); padding: 20px; border-radius: 8px; text-align: center;">
        <p id="emoji-feedback-text" style="color: var(--text-primary); font-weight: bold;">Share Results With Friends:
        </p>
        <div id="emoji-feedback-container" style="margin-bottom: 15px; line-height: 1.5;"></div>
        <button id="copy-emoji-button" class="btn primary-btn">Copy Results</button>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="script.js"></script>
    <script>
        // Display auth status
        const player = localStorage.getItem('loredle_username');
        if (player) {
            document.getElementById('auth-status-game').textContent = `Tracking Score for: ${player}`;
        }
    </script>
</body>

</html>
