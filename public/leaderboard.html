<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loredle - Daily Leaderboard</title>
    <link rel="stylesheet" href="styles.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8C76E2T1CC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8C76E2T1CC');
  </script>
</head>

<body>
    <div class="menu-container" style="max-width: 600px;">
        <h2 style="color: var(--primary-color); margin-top: 0;">Today's Leaderboard</h2>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Ranked by fewest tries to solve.</p>

        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Username</th>
                    <th>Tries</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr>
                    <td colspan="3" style="color: var(--text-secondary);">Loading scores...</td>
                </tr>
            </tbody>
        </table>

        <div class="button-group" style="margin-top: 30px;">
            <button onclick="location.href='/index.html'" class="btn secondary-btn">Back to Home</button>
        </div>
    </div>

    <script>
        async function loadLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');

            try {
                const response = await fetch('/api/leaderboard');
                const scores = await response.json();

                tbody.innerHTML = '';

                if (scores.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="color: var(--text-secondary);">No scores yet today. Be the first!</td></tr>';
                    return;
                }

                scores.forEach((score, index) => {
                    const row = document.createElement('tr');

                    // Add some flair to the top 3 spots
                    let rankDisplay = index + 1;
                    if (index === 0) rankDisplay = '🥇 1';
                    if (index === 1) rankDisplay = '🥈 2';
                    if (index === 2) rankDisplay = '🥉 3';

                    row.innerHTML = `
                        <td>${rankDisplay}</td>
                        <td style="font-weight: bold;">${score.username}</td>
                        <td>${score.tries}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="3" style="color: var(--incorrect);">Failed to load leaderboard.</td></tr>';
            }
        }

        // Initialize fetching when page loads
        loadLeaderboard();
    </script>
</body>

</html>
